  <div class="card">

  </div>

  <div class="card">
    <h3 id="optionA"></h3>
    <img src="https://via.placeholder.com/600">

  </div>

  <div class="card">
    <h3 id="optionB"></h3>
    <img src="https://via.placeholder.com/600">
    <p>$400–700</p>
    <button id="chooseB"></button>
  </div>

  <div class="card">
    <h3 id="optionC"></h3>
    <img src="https://via.placeholder.com/600">
    <p>$900+</p>
    <button id="chooseC"></button>
  </div>

  <p id="boundary"></p>

</div>

<script src="content.js"></script>
<script src="app.js"></script>

</body>
</html>
