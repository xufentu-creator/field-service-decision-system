<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Result</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <h1 id="resultTitle">Your Recommended Options</h1>

    <div class="card">
      <h3 id="current">Current Condition</h3>
      <img src="https://via.placeholder.com/600" alt="Current space">
      <p id="currentDesc">Based on your uploaded problem and goal.</p>
    </div>

    <div class="card">
      <h3 id="optionA">Option A</h3>
      <img src="https://via.placeholder.com/600" alt="Option A">
      <p id="priceA">$150–300</p>
      <p id="descA">Description will appear here.</p>
      <button id="chooseA">Choose Option A</button>
    </div>

    <div class="card">
      <h3 id="optionB">Option B</h3>
      <img src="https://via.placeholder.com/600" alt="Option B">
      <p id="priceB">$400–700</p>
      <p id="descB">Description will appear here.</p>
      <button id="chooseB">Choose Option B</button>
    </div>

    <div class="card">
      <h3 id="optionC">Option C</h3>
      <img src="https://via.placeholder.com/600" alt="Option C">
      <p id="priceC">$900+</p>
      <p id="descC">Description will appear here.</p>
      <button id="chooseC">Choose Option C</button>
    </div>

    <p id="boundary"></p>

  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const saved = localStorage.getItem("optionsData");
      console.log("DATA:", saved);

      if (!saved) {
        document.getElementById("boundary").innerText = "No data returned from backend.";
        return;
      }

      const data = JSON.parse(saved);
      const options = data.options || [];

      if (options[0]) {
        document.getElementById("optionA").innerText = options[0].name || "Option A";
        document.getElementById("descA").innerText = options[0].description || "No description available.";
        if (options[0].price) {
          document.getElementById("priceA").innerText = options[0].price;
        }
      }

      if (options[1]) {
        document.getElementById("optionB").innerText = options[1].name || "Option B";
        document.getElementById("descB").innerText = options[1].description || "No description available.";
        if (options[1].price) {
          document.getElementById("priceB").innerText = options[1].price;
        }
      }

      if (options[2]) {
        document.getElementById("optionC").innerText = options[2].name || "Option C";
        document.getElementById("descC").innerText = options[2].description || "No description available.";
        if (options[2].price) {
          document.getElementById("priceC").innerText = options[2].price;
        }
      }

      document.getElementById("boundary").innerText = data.boundaryNote || "";
    });
  </script>

  <script src="app.js"></script>
</body>
</html>
