<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Result</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <h1>Your Recommended Options</h1>

    <!-- 当前 -->
    <div class="card">
      <h3>Current Condition</h3>
      <img id="currentImage" src="https://via.placeholder.com/600">
      <p id="currentDesc"></p>
    </div>

    <!-- A -->
    <div class="card">
      <h3 id="titleA"></h3>
      <img id="imgA">
      <p id="priceA"></p>
      <p id="descA"></p>
      <button id="chooseA">Choose</button>
    </div>

    <!-- B -->
    <div class="card">
      <h3 id="titleB"></h3>
      <img id="imgB">
      <p id="priceB"></p>
      <p id="descB"></p>
      <button id="chooseB">Choose</button>
    </div>

    <!-- C -->
    <div class="card">
      <h3 id="titleC"></h3>
      <img id="imgC">
      <p id="priceC"></p>
      <p id="descC"></p>
      <button id="chooseC">Choose</button>
    </div>

    <p id="boundary"></p>

  </div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const saved = localStorage.getItem("optionsData");

  if (!saved) {
    document.getElementById("boundary").innerText = "No data";
    return;
  }

  const data = JSON.parse(saved);
  const options = data.options || [];

  document.getElementById("currentDesc").innerText =
    "Generated based on your input";

  document.getElementById("boundary").innerText =
    data.boundaryNote || "";

  // A
  if (options[0]) {
    document.getElementById("titleA").innerText = options[0].name;
    document.getElementById("descA").innerText = options[0].description;
    document.getElementById("priceA").innerText = options[0].priceRange;
    document.getElementById("imgA").src = options[0].previewImage;
  }

  // B
  if (options[1]) {
    document.getElementById("titleB").innerText = options[1].name;
    document.getElementById("descB").innerText = options[1].description;
    document.getElementById("priceB").innerText = options[1].priceRange;
    document.getElementById("imgB").src = options[1].previewImage;
  }

  // C
  if (options[2]) {
    document.getElementById("titleC").innerText = options[2].name;
    document.getElementById("descC").innerText = options[2].description;
    document.getElementById("priceC").innerText = options[2].priceRange;
    document.getElementById("imgC").src = options[2].previewImage;
  }

});
</script>

</body>
</html>
