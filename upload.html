<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Upload</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <div class="card">
      <h1 id="uploadTitle">Upload and describe your goal</h1>
      <p class="muted">Take a photo of the current condition and describe what you want to change.</p>

      <label for="photoInput" class="upload-box">
        <span>📷 Take or upload a photo</span>
      </label>
      <input id="photoInput" type="file" accept="image/*" capture="environment" style="display:none;">

      <img id="photoPreview" style="display:none;width:100%;max-width:520px;border-radius:12px;margin:16px 0;" alt="Preview">

      <textarea id="problemInput" placeholder="What is the current problem?" rows="3"></textarea>

      <textarea id="goalInput" placeholder="What would you like it to become?" rows="3"></textarea>

      <button onclick="goResult()" id="generateBtn">Generate options</button>
    </div>
  </div>

  <script src="content.js"></script>
  <script src="app.js"></script>
</body>
</html>
