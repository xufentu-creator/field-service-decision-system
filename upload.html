<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Upload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <h1 id="uploadTitle"></h1>
    <p id="uploadSubtitle"></p>

    <div class="card">
      <label for="photoInput" class="label-text" id="photoLabel"></label>
      <input type="file" id="photoInput" accept="image/*" capture="environment">
      <img id="previewImage" class="preview-img" style="display:none;" alt="Preview">
    </div>

    <div class="card">
      <label for="userGoal" class="label-text" id="goalLabel"></label>
      <textarea id="userGoal" rows="5" placeholder="Describe your goal..."></textarea>
    </div>

    <button onclick="generateOptions()" id="generateBtn"></button>

  </div>

  <script src="content.js"></script>
  <script src="app.js"></script>
</body>
</html>
